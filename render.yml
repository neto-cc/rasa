env:
  - name: PYTHON_VERSION
    value: "3.10.10"
  - name: PORT
    value: "5005"

services:
  - type: web
    name: my-flask-app
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python app.py"
    envVars:
      - key: PORT
        value: "5005"  # 必要なポート番号を指定

